name: Build
on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag'
        required: true
        default: '2025.04.16'
      build_windows:
        type: boolean
        description: 'Build Windows'
        required: false
        default: 'true'
      build_windows_debug:
        type: boolean
        description: 'Build Windows CPU Debug'
        required: false
        default: 'false'
      build_linux:
        type: boolean
        description: 'Build Linux'
        required: false
        default: 'true'
      build_linux_arm:
        type: boolean
        description: 'Build Linux (Arm64)'
        required: false
        default: 'true'
      build_mac:
        type: boolean
        description: 'Build Mac'
        required: false
        default: 'true'
      build_docker:
        type: boolean
        description: 'Build Docker'
        required: false
        default: 'true'
 
jobs:    

  linux-build:
    if: ${{ github.event.inputs.build_linux == 'true' }}
    strategy:
      matrix:
        os: [ubuntu2404,ubuntu2204,ubuntu2004]
      fail-fast: false
    runs-on: ubuntu-latest
    steps:
    - name: Download Build
      run: |
        git clone https://x-access-token:${{ secrets.DSISTUDIO_TOKEN }}@github.com/frankyeh/DSI-Studio-Build.git  
        mv DSI-Studio-Build/build_packages .
    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3.0.0
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3.0.0
    - name: Build and push
      uses: docker/build-push-action@v5.1.0
      with:
        context: .
        cache-from: type=gha
        cache-to: type=gha,mode=max
        build-args: |
          DSISTUDIO_TOKEN=${{ secrets.DSISTUDIO_TOKEN }}        
        file: build_packages/${{ matrix.os }}/Dockerfile
        push: false
        outputs: dsi-studio-cpu
    - name: Build and push
      uses: docker/build-push-action@v5.1.0
      with:
        context: .
        build-args: |
          DSISTUDIO_TOKEN=${{ secrets.DSISTUDIO_TOKEN }}        
        file: build_packages/${{ matrix.os }}/Dockerfile_cuda
        push: false
        outputs: dsi-studio
    - name: Packaging
      run: |
        zip -r dsi_studio_${{ matrix.os }}_cpu.zip dsi-studio-cpu
        zip -r dsi_studio_${{ matrix.os }}.zip dsi-studio
    - name: Create Release
      env:
        GH_TOKEN: ${{ secrets.DSISTUDIO_TOKEN }}
      run: |
        gh release upload ${{ github.event.inputs.tag }} *.zip --clobber --repo frankyeh/DSI-Studio

  linux-build-arm:
    if: ${{ github.event.inputs.build_linux_arm == 'true' }}
    strategy:
      matrix:
        os: [ubuntu2404,ubuntu2204]
      fail-fast: false
    runs-on: ubuntu-24.04-arm
    steps:
    - name: Download Build
      run: |
        git clone https://x-access-token:${{ secrets.DSISTUDIO_TOKEN }}@github.com/frankyeh/DSI-Studio-Build.git  
        mv DSI-Studio-Build/build_packages .
    - name: Prepare Dockerfile for ARM build (CPU)
      run: |
        DOCKERFILE_PATH="build_packages/${{ matrix.os }}/Dockerfile"
        echo "Modifying Dockerfile: $DOCKERFILE_PATH"
        # 1. Modify the FROM line to use the _arm base image
        sed -i '1s|\(:latest as builder-stage\)$|_arm\1|' "$DOCKERFILE_PATH"
        # 2. Modify the linuxdeployqt download URL to use the aarch64 version
        # This replaces 'x86_64.AppImage' with 'aarch64.AppImage' in the download URL.
        sed -i 's|linuxdeployqt-continuous-x86_64.AppImage|linuxdeployqt-continuous-aarch64.AppImage|' "$DOCKERFILE_PATH"
        echo "Modified Dockerfile content:"
        cat "$DOCKERFILE_PATH"
    - name: Prepare Dockerfile for ARM build (CUDA)
      run: |
        DOCKERFILE_PATH="build_packages/${{ matrix.os }}/Dockerfile_cuda"
        echo "Modifying Dockerfile: $DOCKERFILE_PATH"
        # 1. Modify the FROM line to use the _arm base image
        sed -i '1s|\(:latest as builder-stage\)$|_arm\1|' "$DOCKERFILE_PATH"
        # 2. Modify the linuxdeployqt download URL to use the aarch64 version
        # This replaces 'x86_64.AppImage' with 'aarch64.AppImage' in the download URL.
        sed -i 's|linuxdeployqt-continuous-x86_64.AppImage|linuxdeployqt-continuous-aarch64.AppImage|' "$DOCKERFILE_PATH"
        echo "Modified Dockerfile content:"
        cat "$DOCKERFILE_PATH"

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3.0.0
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3.0.0
    - name: Build and push (CPU)
      uses: docker/build-push-action@v5.1.0
      with:
        context: .
        cache-from: type=gha
        cache-to: type=gha,mode=max
        build-args: |
          DSISTUDIO_TOKEN=${{ secrets.DSISTUDIO_TOKEN }}        
        file: build_packages/${{ matrix.os }}/Dockerfile
        push: false
        outputs: dsi-studio-cpu
    - name: Build and push (CUDA)
      uses: docker/build-push-action@v5.1.0
      with:
        context: .
        build-args: |
          DSISTUDIO_TOKEN=${{ secrets.DSISTUDIO_TOKEN }}        
        file: build_packages/${{ matrix.os }}/Dockerfile_cuda
        push: false
        outputs: dsi-studio
    - name: Packaging
      run: |
        zip -r dsi_studio_${{ matrix.os }}_cpu_arm64.zip dsi-studio-cpu
        zip -r dsi_studio_${{ matrix.os }}_arm64.zip dsi-studio
    - name: Create Release
      env:
        GH_TOKEN: ${{ secrets.DSISTUDIO_TOKEN }}
      run: |
        gh release upload ${{ github.event.inputs.tag }} *.zip --clobber --repo frankyeh/DSI-Studio

  macos-build:
    if: ${{ github.event.inputs.build_mac == 'true' }}
    strategy:
      matrix:
        include:
          - runner: macos-14
            name: macos-14-arm64
            tiny_fsl: macos-15
            jobs: 3
  
          - runner: macos-15-intel
            name: macos-15-intel
            tiny_fsl: macos-13
            jobs: 4
      fail-fast: false
  
    runs-on: ${{ matrix.runner }}
  
    steps:
      - uses: actions/checkout@v4
  
      - name: Download Build
        run: |
          git clone --depth 1 https://x-access-token:${{ secrets.DSISTUDIO_TOKEN }}@github.com/frankyeh/DSI-Studio-Build.git
          mv DSI-Studio-Build/*.txt .
          mv DSI-Studio-Build/build_packages/build_mac.sh .
  
      - name: Check tools
        run: |
          cmake --version
          ninja --version || brew install ninja
          ccache --version || brew install ccache
  
      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: 6.8
          modules: qtcharts
          cache: true
  
      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: macos-ccache-${{ matrix.name }}-${{ github.ref_name }}
          restore-keys: |
            macos-ccache-${{ matrix.name }}-
  
      - name: Build DSI Studio
        run: |
          sh build_mac.sh "${{ matrix.tiny_fsl }}" "${{ matrix.jobs }}"
          file dsi_studio.app/Contents/MacOS/dsi_studio
          ditto -c -k --sequesterRsrc --keepParent dsi_studio.app dsi_studio_${{ matrix.name }}_qt6.zip
  
      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.DSISTUDIO_TOKEN }}
        run: |
          gh release upload ${{ github.event.inputs.tag }} *.zip --clobber


  docker_build:
    if: ${{ github.event.inputs.build_docker == 'true' }}
    runs-on: ubuntu-latest
    steps:
  
      - name: Download Build
        run: |
          git clone https://x-access-token:${{ secrets.DSISTUDIO_TOKEN }}@github.com/frankyeh/DSI-Studio-Build.git
          mv DSI-Studio-Build/build_packages .
  
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
  
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
  
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
  
      - name: Current Time
        run: echo "DATE_TAG=$(date '+%Y-%m-%d')" >> $GITHUB_ENV
  
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: build_packages/docker/Dockerfile
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            DSISTUDIO_TOKEN=${{ secrets.DSISTUDIO_TOKEN }}
            CACHE_BUST=${{ github.run_id }}-${{ github.run_attempt }}
          tags: |
            dsistudio/dsistudio:hou-${{ env.DATE_TAG }}
            dsistudio/dsistudio:latest

  windows_build_cpu:
    if: ${{ github.event.inputs.build_windows == 'true' }}
    runs-on:  windows-2022
    steps:
    - uses: actions/checkout@v4.1.1
    - name: Download Build
      run: |
        git clone https://x-access-token:${{ secrets.DSISTUDIO_TOKEN }}@github.com/frankyeh/DSI-Studio-Build.git  
        move DSI-Studio-Build/*.txt .
        move DSI-Studio-Build/build_packages .
    - name: Install Qt
      uses: Kidev/install-qt-action@v4.6.0
      with:
        modules: qtcharts
        cache: true
    - name: Build
      run: |
        call .\build_packages\build_win.bat
        if exist "dsi_studio_win\dsi_studio.exe" (
          echo "dsi_studio.exe exists!"
        ) else (
          echo "Error: dsi_studio.exe not found!" >&2
          exit /b 1
        )
        move dsi_studio_win.zip dsi_studio_win_cpu_temp.zip
      shell: cmd
    - name: Create Release
      env:
        GH_TOKEN: ${{ secrets.DSISTUDIO_TOKEN }}
      run: |
        gh release upload ${{ github.event.inputs.tag }} dsi_studio_win_cpu_temp.zip --clobber

  windows_build_cpu_debug:
    if: ${{ github.event.inputs.build_windows_debug == 'true' }}
    runs-on: windows-2022
    steps:
    - uses: actions/checkout@v4.1.1
    - name: Download Build
      run: |
        git clone https://x-access-token:${{ secrets.DSISTUDIO_TOKEN }}@github.com/frankyeh/DSI-Studio-Build.git
        move DSI-Studio-Build/*.txt .
        move DSI-Studio-Build/build_packages .
    - name: Install Qt
      uses: Kidev/install-qt-action@v4.6.0
      with:
        modules: qtcharts
        cache: true
    - name: Build debug CPU package
      run: |
        git clone --depth 1 https://github.com/frankyeh/TIPL.git
        choco install ninja cmake
        call .\build_packages\install_zlib.bat
        del "C:/Program Files/zlib/lib/zlib.lib"
        del "C:/Program Files/zlib/bin/zlib.dll"
        for /f "usebackq delims=#" %%a in (`"%programfiles(x86)%\Microsoft Visual Studio\Installer\vswhere" -latest -property installationPath`) do call "%%a\Common7\Tools\VsDevCmd.bat" -arch=x64
        mkdir build_debug
        cmake -S . -B build_debug -GNinja "-DZLIB_LIBRARY=C:/Program Files/zlib/lib/zlibstatic.lib" "-DCMAKE_BUILD_TYPE:STRING=RelWithDebInfo" "-DCMAKE_C_COMPILER:STRING=cl" "-DCMAKE_CXX_COMPILER:STRING=cl" -DTIPL_DIR=.
        cmake --build ./build_debug --parallel --config RelWithDebInfo
        mkdir dsi_studio_win_cpu_debug
        move other\color_map dsi_studio_win_cpu_debug
        move other\* dsi_studio_win_cpu_debug
        copy build_debug\dsi_studio.exe dsi_studio_win_cpu_debug\dsi_studio.exe
        copy build_debug\dsi_studio.pdb dsi_studio_win_cpu_debug\dsi_studio.pdb
        windeployqt --no-translations --no-system-d3d-compiler --compiler-runtime dsi_studio_win_cpu_debug\dsi_studio.exe
        git clone --depth 1 https://github.com/data-others/atlas.git
        git clone --depth 1 https://github.com/data-others/unet.git
        git clone --depth 1 https://github.com/data-others/tract.git
        rd /s /q atlas\.git
        rd /s /q unet\.git
        rd /s /q tract\.git
        move atlas dsi_studio_win_cpu_debug
        move unet dsi_studio_win_cpu_debug
        move tract dsi_studio_win_cpu_debug
        curl -sSLO "https://github.com/frankyeh/TinyFSL/releases/download/2022.08.03/tiny_fsl_win.zip"
        7z e tiny_fsl_win.zip -odsi_studio_win_cpu_debug\plugin
        rm dsi_studio_win_cpu_debug\plugin\cublas*
        rd dsi_studio_win_cpu_debug\plugin\tiny_fsl
        del *.zip
        7z a -tzip dsi_studio_win_cpu_debug.zip dsi_studio_win_cpu_debug
      shell: cmd
    - name: Create Release
      env:
        GH_TOKEN: ${{ secrets.DSISTUDIO_TOKEN }}
      run: |
        gh release upload ${{ github.event.inputs.tag }} dsi_studio_win_cpu_debug.zip --clobber

  windows_build:
    if: ${{ github.event.inputs.build_windows == 'true' }}
    runs-on: windows-2022
    steps:
    - uses: actions/checkout@v4.1.1
    - name: Download Build
      run: |
        git clone https://x-access-token:${{ secrets.DSISTUDIO_TOKEN }}@github.com/frankyeh/DSI-Studio-Build.git  
        move DSI-Studio-Build/*.txt .
        move DSI-Studio-Build/build_packages .
    - name: Install Cuda
      uses: Jimver/cuda-toolkit@v0.2.23
    - name: Install Qt
      uses: Kidev/install-qt-action@v4.6.0
      with:
        modules: qtcharts
        cache: true
    - name: Build
      run: |
        call .\build_packages\build_win.bat
        if exist "dsi_studio_win\dsi_studio.exe" (
          echo "dsi_studio.exe exists!"
        ) else (
          echo "Error: dsi_studio.exe not found!" >&2
          exit /b 1
        )
        move dsi_studio_win.zip dsi_studio_win_temp.zip
      shell: cmd
    - name: Create Release
      env:
        GH_TOKEN: ${{ secrets.DSISTUDIO_TOKEN }}
      run: |
        gh release upload ${{ github.event.inputs.tag }} dsi_studio_win_temp.zip --clobber        
        
          
