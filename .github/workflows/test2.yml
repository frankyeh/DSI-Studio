name: DSI Studio Test 

on:
  workflow_dispatch:
  workflow_call:

jobs:
  linux-build:
    runs-on: ubuntu-latest
    steps:
      - name: Download Build
        run: |
          git clone https://x-access-token:${{ secrets.DSISTUDIO_TOKEN }}@github.com/frankyeh/DSI-Studio-Build.git
          mv DSI-Studio-Build/build_packages .

      - uses: docker/setup-qemu-action@v3.0.0
      - uses: docker/setup-buildx-action@v3.0.0

      - name: Build Linux
        uses: docker/build-push-action@v5.1.0
        with:
          context: .
          build-args: |
            DSISTUDIO_TOKEN=${{ secrets.DSISTUDIO_TOKEN }}
          file: build_packages/ubuntu2404/Dockerfile
          push: false
          outputs: dsi-studio

      - name: Upload Linux Build
        uses: actions/upload-artifact@v4
        with:
          name: dsi_studio_linux
          path: dsi-studio

  windows-cpu-build:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4.1.1

      - name: Download Build
        shell: cmd
        run: |
          git clone https://x-access-token:${{ secrets.DSISTUDIO_TOKEN }}@github.com/frankyeh/DSI-Studio-Build.git
          move DSI-Studio-Build\*.txt .
          move DSI-Studio-Build\build_packages .

      - name: Install Qt
        uses: Kidev/install-qt-action@v4.6.0
        with:
          modules: qtcharts
          cache: true

      - name: Build Windows CPU
        shell: cmd
        run: |
          call .\build_packages\build_win.bat
          if not exist "dsi_studio_win\dsi_studio.exe" exit /b 1

      - name: Upload Windows CPU Build
        uses: actions/upload-artifact@v4
        with:
          name: dsi_studio_win_cpu
          path: dsi_studio_win

  macos-arm-build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Download Build
        run: |
          git clone --depth 1 https://x-access-token:${{ secrets.DSISTUDIO_TOKEN }}@github.com/frankyeh/DSI-Studio-Build.git
          mv DSI-Studio-Build/*.txt .
          mv DSI-Studio-Build/build_packages/build_mac.sh .

      - name: Check tools
        run: |
          cmake --version
          ninja --version || brew install ninja
          ccache --version || brew install ccache

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: 6.8
          modules: qtcharts
          cache: true

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: macos-ccache-arm64-${{ github.ref_name }}
          restore-keys: |
            macos-ccache-arm64-

      - name: Build macOS ARM
        run: |
          sh build_mac.sh macos-15 3
          file dsi_studio.app/Contents/MacOS/dsi_studio

      - name: Upload macOS ARM Build
        uses: actions/upload-artifact@v4
        with:
          name: dsi_studio_macos_arm
          path: dsi_studio.app

  test-routines:
    needs: [linux-build, windows-cpu-build, macos-arm-build]
    runs-on: ${{ matrix.platform.os }}

    strategy:
      fail-fast: false
      matrix:
        platform:
          - os: ubuntu-latest
            artifact: dsi_studio_linux
            path: dsi-studio
            bin: dsi-studio
            exe: dsi_studio

          - os: windows-2022
            artifact: dsi_studio_win_cpu
            path: dsi_studio_win
            bin: dsi_studio_win
            exe: dsi_studio.exe

          - os: macos-14
            artifact: dsi_studio_macos_arm
            path: dsi_studio_macos_arm
            bin: dsi_studio_macos_arm/dsi_studio.app/Contents/MacOS
            exe: dsi_studio

        routine:
          - dicom
          - image-processing
          - bids
          - animal-recon
          - human-recon
          - human-tracking-qsdr
          - db
          - connectometry
          - human-tracking-gqi
          - export-registration
          - automatic-tracking
          - src-construction
          - topup

    steps:
      - name: Download DSI Studio
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.platform.artifact }}
          path: ${{ matrix.platform.path }}

      - name: Prepare DSI Studio
        shell: bash
        run: |
          find "${{ matrix.platform.path }}" -maxdepth 6 -name "${{ matrix.platform.exe }}" -print
          ls -l "${{ matrix.platform.bin }}/${{ matrix.platform.exe }}"
          chmod +x "${{ matrix.platform.bin }}/${{ matrix.platform.exe }}" || true
          echo "$PWD/${{ matrix.platform.bin }}" >> "$GITHUB_PATH"

      - name: Cache FSL
        if: ${{ runner.os == 'Linux' && matrix.routine == 'topup' }}
        id: cache-fsl
        uses: actions/cache@v4
        with:
          path: /opt/fsl
          key: linux-fsl6.0.5.2

      - name: Install FSL
        if: ${{ runner.os == 'Linux' && matrix.routine == 'topup' && steps.cache-fsl.outputs.cache-hit != 'true' }}
        shell: bash
        run: |
          curl -sSL https://fsl.fmrib.ox.ac.uk/fsldownloads/fsl-6.0.5.2-centos7_64.tar.gz | sudo tar zxv --no-same-owner -C /opt \
            --exclude='fsl/doc' \
            --exclude='fsl/refdoc' \
            --exclude='fsl/python/oxford_asl' \
            --exclude='fsl/data/possum' \
            --exclude='fsl/data/first' \
            --exclude='fsl/data/mist' \
            --exclude='fsl/data/atlases' \
            --exclude='fsl/data/xtract_data' \
            --exclude='fsl/extras/doc' \
            --exclude='fsl/extras/man' \
            --exclude='fsl/extras/src' \
            --exclude='fsl/src'

      - name: Set FSL Environment
        if: ${{ runner.os == 'Linux' && matrix.routine == 'topup' }}
        shell: bash
        run: |
          echo "OS=Linux" >> "$GITHUB_ENV"
          echo "FSLDIR=/opt/fsl" >> "$GITHUB_ENV"
          echo "FSL_DIR=/opt/fsl" >> "$GITHUB_ENV"
          echo "FSLOUTPUTTYPE=NIFTI_GZ" >> "$GITHUB_ENV"
          echo "FSLMULTIFILEQUIT=TRUE" >> "$GITHUB_ENV"
          echo "LD_LIBRARY_PATH=/opt/fsl/lib:${LD_LIBRARY_PATH}" >> "$GITHUB_ENV"
          echo "FSLTCLSH=/usr/bin/tclsh" >> "$GITHUB_ENV"
          echo "FSLWISH=/usr/bin/wish" >> "$GITHUB_ENV"
          echo "/opt/fsl/bin" >> "$GITHUB_PATH"

      - name: Run ${{ matrix.routine }}
        shell: bash
        run: |
          set -euxo pipefail
          which dsi_studio

          case "${{ matrix.routine }}" in

            dicom)
              mkdir -p data
              curl -L https://ndownloader.figshare.com/files/36168675 -o data/download.zip
              cd data
              jar xf download.zip
              rm download.zip
              cd ..

              dsi_studio --action=ren --source=./data/
              dsi_studio --action=src --source=./data/

              mv ./data/*/*.nii.gz ./data
              cd data
              dsi_studio --action=img --source=*.nii.gz --cmd=change_type:3+normalize_otsu_median+upper_threshold:1+normalize:1+change_type:0 --output=../
              ;;

            image-processing)
              curl -sL https://github.com/data-openneuro/brain/releases/download/ds000113/sub-01_ses-forrestgump_T1w.nii.gz -o sub-01_ses-forrestgump_T1w.nii.gz

              dsi_studio --action=img --source=sub-01_ses-forrestgump_T1w.nii.gz --cmd=change_type:3+bias_field_correction+normalize_otsu_median+change_type:0 --output=sub-01_ses-forrestgump_T1w_norm.nii.gz
              ls sub-01_ses-forrestgump_T1w_norm.nii.gz

              dsi_studio --action=img --source=sub-01_ses-forrestgump_T1w.nii.gz --cmd=segmentation --output=sub-01_ses-forrestgump_T1w_seg.nii.gz --model=human_synthseg
              ls sub-01_ses-forrestgump_T1w_seg.nii.gz
              ;;

            bids)
              aws s3 sync s3://openneuro.org/ds001378/ ./ds001378 --no-sign-request --region eu-west-1 --exclude "*bold*"

              dsi_studio --action=src --source=./ds001378/
              ls ./ds001378/*/*/*/*.sz

              mv ./ds001378/*/*/*/*.sz .
              dsi_studio --action=rec --source=*.sz
              ls *.fz
              ;;

            animal-recon)
              curl -sL "https://zenodo.org/record/6321169/files/mountsinai-S-sub-032156_dwi.src.gz?download=1" -o rhesus.src.gz

              dsi_studio --source=*.src.gz --action=rec --method=1
              ls rhesus.dti.fz

              dsi_studio --source=*.src.gz --action=rec
              ls rhesus.gqi.fz

              dsi_studio --source=*.src.gz --action=rec --method=7
              ls rhesus.qsdr.fz
              ;;

            human-recon)
              curl -sL https://github.com/data-openneuro/brain/releases/download/ds004737/sub-15852_ses-1_dwi.sz -o dsi.sz
              curl -sL https://github.com/data-openneuro/brain/releases/download/ds000244/sub-01_ses-00_dwi.sz -o dti.sz
              curl -sL https://github.com/data-openneuro/brain/releases/download/ds000031/sub-01_ses-004_dwi.sz -o ms.sz

              dsi_studio --source=*.sz --action=rec --method=1
              ls dsi.dti.fz dti.dti.fz ms.dti.fz

              dsi_studio --source=*.sz --action=rec
              ls dsi.gqi.fz dti.gqi.fz ms.gqi.fz

              dsi_studio --source=*.sz --action=rec --method=7 --template=0
              ls dsi.qsdr.fz dti.qsdr.fz ms.qsdr.fz
              ;;

            human-tracking-qsdr)
              curl -sL https://github.com/data-others/tract/blob/main/human.fz?raw=true -o human.fz
              curl -sL https://github.com/data-hcp/lifespan/releases/download/hcp-ya/100206.gqi.fz -o 100206.gqi.fz

              dsi_studio --source=human.fz --action=trk --output=icbm152.tt.gz --export=stat,tdi
              dsi_studio --source=100206.gqi.fz --action=trk --output=100206.tt.gz --export=stat,tdi
              ls icbm152.tt.gz icbm152.tt.gz.tdi.nii.gz icbm152.tt.gz.stat.txt
              ls 100206.tt.gz 100206.tt.gz.tdi.nii.gz 100206.tt.gz.stat.txt

              dsi_studio --source=human.fz --action=trk --track_id=ArcuateFasciculusL --tip_iteration=0 --output=AF_L.tt.gz
              dsi_studio --source=100206.gqi.fz --action=trk --track_id=ArcuateFasciculusL --tip_iteration=0 --output=100206.AF_L.tt.gz
              ls AF_L.tt.gz 100206.AF_L.tt.gz

              dsi_studio --source=human.fz --action=trk --seed_count=1000000 --roi=FreeSurferDKT_Cortical:left_precentral,dilate,dilate,smoothing --roi2=FreeSurferDKT_Cortical:right_precentral,dilate,dilate,smoothing --output=LR.tt.gz
              dsi_studio --source=100206.gqi.fz --action=trk --seed_count=1000000 --roi=FreeSurferDKT_Cortical:left_precentral,dilate,dilate,smoothing --roi2=FreeSurferDKT_Cortical:right_precentral,dilate,dilate,smoothing --output=100206.LR.tt.gz
              ls LR.tt.gz 100206.LR.tt.gz

              dsi_studio --source=human.fz --action=trk --tract_count=1000000 --output=no_file --connectivity=FreeSurferDKT_Cortical
              dsi_studio --source=100206.gqi.fz --action=trk --tract_count=1000000 --output=no_file --connectivity=FreeSurferDKT_Cortical
              ls human.fz.tt.gz.FreeSurferDKT_Cortical.connectivity.mat
              ls 100206.gqi.fz.tt.gz.FreeSurferDKT_Cortical.connectivity.mat
              ;;

            db)
              curl -fsSL https://api.github.com/repos/data-openneuro/disease/releases/tags/ds001378 -o release.json

              jq -r '.assets[]
                | select((.name | endswith(".qsdr.fz")) or .name == "participants.tsv")
                | [.name, .browser_download_url]
                | @tsv' release.json |
              while IFS=$'\t' read -r name url; do
                name="${name//$'\r'/}"
                url="${url//$'\r'/}"
                echo "Downloading $name"
                curl -fL --retry 3 "$url" -o "$name"
              done

              ls *.qsdr.fz participants.tsv

              dsi_studio --source=*.qsdr.fz --action=db --output=sca2.dz
              ls sca2.dz

              dsi_studio --source=sca2.dz --action=cnt --voi=0 --variable_list=0,1,2 --index_name=dti_fa
              cat *.html
              ls *.dec.no_tract.txt *.inc.tt.gz
              ;;

            connectometry)
              curl -sL https://github.com/data-openneuro/disease/releases/download/ds001378/sub-all.dz -o sub-all.dz

              dsi_studio --source=sub-all.dz --action=cnt_cl --variable_list=0,1,2 --voi=0 --index_name=qa
              cat *.html
              ls *.dec.no_tract.txt *.inc.tt.gz
              ;;

            human-tracking-gqi)
              curl -sL https://github.com/data-openneuro/brain/releases/download/ds001771/sub-03_dwi.gqi.fz -o gqi.fz
              curl -sL https://github.com/frankyeh/data-atlas/blob/main/human/human_QA.nii.gz?raw=true -o human_QA.nii.gz

              dsi_studio --source=gqi.fz --action=trk --output=gqi.tt.gz --export=stat,tdi
              ls gqi.tt.gz gqi.tt.gz.tdi.nii.gz gqi.tt.gz.stat.txt

              dsi_studio --source=gqi.fz --action=trk --track_id=ArcuateFasciculusL --tip_iteration=0 --output=AF_L.tt.gz
              ls AF_L.tt.gz

              dsi_studio --source=gqi.fz --action=trk --seed_count=1000000 --roi=FreeSurferDKT_Cortical:left_precentral,dilate,dilate,smoothing --roi2=FreeSurferDKT_Cortical:right_precentral,dilate,dilate,smoothing --output=LR.tt.gz
              ls LR.tt.gz

              dsi_studio --source=gqi.fz --action=trk --output=no_file --connectivity=FreeSurferDKT_Cortical
              ls gqi.fz.tt.gz.FreeSurferDKT_Cortical.connectivity.mat

              dsi_studio --source=gqi.fz --action=trk --other_slices=human_QA.nii.gz --dt_metric1=human_QA --dt_metric2=qa --seed_count=1000000 --dt_threshold=0.1 --output=dt.tt.gz
              ls dt.tt.gz
              ;;

            export-registration)
              curl -sL https://github.com/data-hcp/lifespan/releases/download/hcp-ya/100206.gqi.fz -o 100206.gqi.fz
              git clone https://github.com/frankyeh/data-atlas.git
              mv data-atlas atlas

              dsi_studio --source=100206.gqi.fz --action=exp --export=qa,iso
              ls 100206.gqi.fz.qa.nii.gz 100206.gqi.fz.iso.nii.gz

              dsi_studio --action=reg --source=100206.gqi.fz.qa.nii.gz --to=./atlas/human/human_QA.nii.gz
              ls 100206.gqi.fz.qa.nii.gz.wp.nii.gz

              dsi_studio --action=reg --source=100206.gqi.fz.qa.nii.gz,100206.gqi.fz.iso.nii.gz --to=./atlas/human/human_QA.nii.gz,./atlas/human/human_ISO.nii.gz
              ls 100206.gqi.fz.qa.nii.gz.wp.nii.gz
              ;;

            automatic-tracking)
              curl -sL https://github.com/data-hcp/lifespan/releases/download/hcp-ya/100206.gqi.fz -o 100206.gqi.fz
              curl -sL https://github.com/data-hcp/lifespan/releases/download/hcp-ya/100307.gqi.fz -o 100307.gqi.fz

              dsi_studio --source=*.fz --action=atk --track_id=ArcuateFasciculusL
              ls */*ArcuateFasciculusL.tt.gz
              ;;

            src-construction)
              aws s3 sync --no-sign-request --region eu-west-1 --exclude "*" --include "*dwi.*" s3://openneuro.org/ds002087 ds002087

              dsi_studio --action=src --source=ds002087
              ls ds002087/sub-01/dwi/sub-01_run-1_dwi.nii.gz
              ls ds002087/sub-01/dwi/sub-01_run-2_dwi.nii.gz
              ;;

            topup)
              aws s3 sync --no-sign-request --region eu-west-1 --exclude "*" --include "*dwi.*" s3://openneuro.org/ds002080/sub-CON02/ses-postop .

              dsi_studio --action=src --bids=1 --topup_eddy=1 --source=./dwi
              ;;

          esac
